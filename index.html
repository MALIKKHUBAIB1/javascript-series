<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .squares {
      width: 200px;
      height: 200px;
      margin-top: 100px;
    }
    #red {
      background-color: rgb(176, 35, 35);
      box-shadow: rgb(247, 244, 244);
      border: transparent;
      border-radius: 10px;
    }
    #green {
      background-color: rgb(71, 146, 71);
      box-shadow: grey;
      border: transparent;
      border-radius: 10px;
    }
    #yellow {
      background-color: rgb(123, 138, 39);
      box-shadow: grey;
      border: transparent;
      border-radius: 10px;
    }
    .conatiner {
      width: 50%;
      margin: auto;
    }
  </style>
  <body>
    <div class="conatiner">
      <button class="squares" id="red" value="red">red</button>
      <button class="squares" id="green" value="green">green</button>
      <button class="squares" id="yellow" value="yellow">yellow</button>
    </div>
    <button class="clear" id="counter">Clear</button>
    <script src="script.js"></script>
  </body>
</html>
